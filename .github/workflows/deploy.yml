name: Production CI/CD with Version Control

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🎯 ম্যাজিক ১: গিটহাবের Commit SHA রিড করে ইমেজ বিল্ড ও পুশ করা
      - name: Build and Push Docker Image
        run: |
          # ${{ github.sha }} গিটহাবের দেওয়া ইউনিক আইডি (যেমন: a1b2c3d) তুলে আনবে
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.sha }}

      - name: Deploy to Kubernetes Cluster
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBERNETES_KUBEconfig }}

      # 🎯 লেইন ২: k8s-deployment.yml ফাইলের ভেতরের ইমেজ ট্যাগটি অটোমেটিক বদলে দেওয়া
      - name: Update K8s Manifest and Apply
        run: |
          # sed কমান্ড দিয়ে ফাইলের ভেতরের 'latest' টেক্সটটিকে গিটহাবের ইউনিক SHA দিয়ে রিপ্লেস করে দেওয়া হচ্ছে
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.sha }}|g" k8s-deployment.yml
          
          # এখন কুবারনেটিসে একদম সুনির্দিষ্ট ভার্সনসহ ফাইলটি অ্যাপ্লাই হবে
          kubectl apply -f k8s-deployment.yml