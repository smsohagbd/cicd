name: Production CI/CD with Short SHA

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # 🎯 ম্যাজিক ১: লম্বা SHA কেটে ৭ ক্যারেক্টারের শর্ট SHA বানানো
      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # এখানে আমরা এখন ${{ steps.vars.outputs.sha_short }} ব্যবহার করছি
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ steps.vars.outputs.sha_short }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ steps.vars.outputs.sha_short }}

      - name: Deploy to Kubernetes Cluster
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBERNETES_KUBEconfig }}

      # 🎯 ম্যাজিক ২: 'sed' কমান্ড দিয়ে k8s-deployment.yml ফাইলে অটো ট্যাগ বসানো
      - name: Update K8s Manifest and Apply
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ steps.vars.outputs.sha_short }}|g" k8s-deployment.yml
          
          kubectl apply -f k8s-deployment.yml